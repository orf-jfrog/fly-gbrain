services:
  - type: web
    name: fly-gbrain
    runtime: image
    image:
      url: ghcr.io/orf-jfrog/fly-gbrain:latest
    plan: free
    envVars:
      - key: GITHUB_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ZERO_ENTROPY_API_KEY
        sync: false
      - key: PUBLIC_URL
        sync: false
