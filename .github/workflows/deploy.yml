name: Build & Deploy

on:
  push:
    branches: [main]

env:
  IMAGE: ghcr.io/orfattal/fly-gbrain

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR (personal account)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: orfattal
          password: ${{ secrets.PACKAGES_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:latest

      - name: Make package public
        run: |
          curl -s -X PATCH \
            -H "Authorization: Bearer ${{ secrets.PACKAGES_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/user/packages/container/fly-gbrain" \
            -d '{"visibility":"public"}' || true

      - name: Trigger Render redeploy
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -d '{"clearCache": "do_not_clear"}' || true
